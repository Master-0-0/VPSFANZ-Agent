  model: deepseek-chat
  api_key: sk-2d4a2e704c0a40f4a8
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      models:
        - gpt-4o
        - gpt-4o-mini
    deepseek:
      api_key: sk-2d4a2e704c0a40
      models:
        - deepseek-chat
        - deepseek-reasoner
    ollama:
      base_url: http://localhost:11434/v1
      api_key: ""
      models:
        - deepseek-r1:7b
